# =============================================================================
# ОСНОВНЫЕ НАСТРОЙКИ — обычно меняют только этот блок
# =============================================================================

mode = "shadow" # Режим: "shadow" только наблюдает, "live" отправляет реальные транзакции.
buy_size_mode = "developer" # Размер buy: "developer" повторяет buy дева до лимита, "fixed" всегда берёт фиксированную сумму.
fixed_buy_amount = 100 # Размер нашего buy в USDT0 при buy_size_mode = "fixed".
developer_buy_cap = 100 # Максимум нашего buy в USDT0 при buy_size_mode = "developer".
minimum_developer_buy = 10 # Минимальный первоначальный buy дева в USDT0 для входа.
below_minimum_fixed_buy_amount = "off" # Фиксированный наш buy в USDT0, если buy дева ниже minimum_developer_buy; "off" сохраняет skip.
maximum_developer_buy = 10 # При первоначальном buy дева выше этого значения в USDT0 пропускаем вход; "off" отключает верхний лимит.
minimum_wallet_reserve = 2 # Сколько нативного USDT0 всегда оставлять на кошельке сверх buy и комиссии.
skip_if_position_open = true # Не открывать новый токен, пока предыдущая позиция или покупка не завершена.

# =============================================================================
# ВЫХОД ИЗ ПОЗИЦИИ — grid, AFK и защитные продажи
# =============================================================================

take_profit_pct = "off" # Полностью продать при этой прибыли в процентах; "off" отключает общий take-profit.
stop_loss_pct = "off" # Полностью продать при убытке, например -20; "off" отключает stop-loss.
minimum_sell = 0.000001 # Не отправлять часть продажи дешевле этой суммы USDT0.
grid_profit_pct = [135, 235, 400, 570, 900, 1235, 1570, 2300, 3400, 5150, 7650, 11400, 17400, 25900, 38900, 57400, 84900, 109900, 209900, 289900, 474900, 849900, 1649900, 2749900] # Пороги прибыли grid в процентах.
grid_sell_percent = [30, 25, 22, 20, 18, 16, 15, 12, 11, 10, 10, 10, 10, 10, 12, 19, 21, 24, 24, 22, 26, 31, 39, 40] # Доля текущего остатка для продажи на каждом соответствующем grid-пороге.
afk_schedule = ["10:100", "30:90", "50:80", "100:70", "200:60", "300:55", "500:60", "800:90", "1200:180", "1800:300", "2650:600", "3900:1200", "5000:2400", "7000:3600", "8000:999999", "10000:999999", "15000:999999", "20000:999999", "30000:999999", "50000:999999", "100000:999999"] # AFK-правила "прибыль_в_%:таймаут_в_секундах".
afk_reset_on = "rise" # Сброс AFK-таймера: "any_move" при движении цены или "rise" только на новом максимуме.
trailing_drop_pct = "off" # Продать при падении на N% от максимума; "off" отключает trailing-stop.
trailing_disable_above = 0 # Отключить trailing выше этой стоимости позиции в USDT0; 0 не отключает никогда.
afk_disable_above = 0 # Отключить AFK выше этой стоимости позиции в USDT0; 0 не отключает никогда.

# =============================================================================
# ФИЛЬТРЫ ДЕВА И МЕТАДАННЫХ — меняются редко
# =============================================================================

developer_balance_tiers = [0] # Нижние границы баланса дева в USDT0 для уровней следующего параметра.
developer_max_initial_buy = [100] # Максимальный initial buy дева для каждого соответствующего balance tier.
max_developer_launches = 1 # Максимум известных запусков одного дева в stable.db; 0 отключает лимит.
allow_profitable_developer = true # Разрешать превышение лимита запусков деву с положительным реализованным PnL.
reject_negative_developer_pnl = true # Отклонять дева, если stable.db уже зафиксировала отрицательный PnL.
minimum_developer_nonce = "off" # Минимальный nonce транзакции дева; "off" отключает фильтр.
require_ipfs_image = true # Требовать изображение токена, размещённое через IPFS.
block_duplicate_image = true # Отклонять уже встречавшийся fingerprint изображения.
block_duplicate_socials = true # Отклонять уже встречавшийся набор социальных ссылок.
block_duplicate_name = true # Отклонять повтор имени в пределах duplicate_name_window_secs.
duplicate_name_window_secs = 120 # Окно в секундах, внутри которого одинаковое имя считается дубликатом.
required_metadata_fields = ["twitter"] # Обязательные поля: telegram, twitter, website и/или description.
required_metadata_fields_mode = "any" # "any" требует одно поле из списка, "all" требует все.

# =============================================================================
# ТЕХНИЧЕСКИЕ ПАРАМЕТРЫ — обычно оставляют без изменений
# =============================================================================

strictly_above_minimum_developer_buy = false # true требует buy дева строго больше minimum_developer_buy; false разрешает равенство.
buy_slippage_bps = 1500 # Проскальзывание buy: 100 bps = 1%, 1500 bps = 15%.
sell_slippage_bps = 1500 # Проскальзывание sell: 100 bps = 1%, 1500 bps = 15%.
max_launch_age_ms = 2500 # Максимальный возраст launch-сигнала в миллисекундах.
buy_gas_limit = 850000 # Gas limit покупки; это потолок, а не обязательный расход.
approve_gas_limit = 120000 # Gas limit approve перед продажей; это потолок, а не обязательный расход.
sell_gas_limit = 800000 # Gas limit продажи; это потолок, а не обязательный расход.
buy_priority_fee_gwei = 0.1 # Максимальная priority fee покупки в Gwei.
sell_priority_fee_gwei = 0.1 # Максимальная priority fee approve и sell в Gwei.
exit_evaluation_interval_ms = 100 # Частота пересчёта grid, AFK, stop-loss и take-profit.
watchdog_interval_ms = 2000 # Частота проверки зависших позиций и незавершённых выходов.
max_sell_retries = 3 # Число повторов неуспешной продажи после первой попытки.
sell_retry_ms = 250 # Пауза между повторными попытками продажи.

# =============================================================================
# RPC И ДОСТАВКА ТРАНЗАКЦИЙ — меняются только при замене провайдера
# =============================================================================

alchemy_rpc_url = "" # HTTPS URL из Alchemy; ускоряет pending lookup и landing, автоматически добавляясь первым в broadcast и как WSS-поток. Пустая строка отключает тюнинг.
http_rpc_urls = ["https://stable.drpc.org", "https://rpc.stable.xyz", "https://rpc.sentio.xyz/stable-mainnet", "https://stable.gateway.tenderly.co"] # HTTP RPC для чтения сети и резервной отправки.
broadcast_rpc_urls = ["https://stable.gateway.tenderly.co", "https://rpc.sentio.xyz/stable-mainnet", "https://rpc.stable.xyz", "https://stable.drpc.org"] # RPC отправки в измеренном приоритетном порядке; Alchemy автоматически станет первым.
websocket_urls = ["wss://rpc.stable.xyz", "wss://rpc.sentio.xyz/stable-mainnet", "wss://stable.gateway.tenderly.co"] # WebSocket RPC для блоков и логов фабрики.
pending_websocket_urls = ["wss://rpc.stable.xyz", "wss://stable.gateway.tenderly.co"] # WebSocket RPC для pending launch-транзакций.
broadcast_fanout = 5 # Максимум RPC для параллельной отправки; без Alchemy автоматически используется четыре доступных маршрута.
rpc_timeout_ms = 1500 # Таймаут одного HTTP RPC-запроса.
receipt_poll_ms = 100 # Частота проверки receipt отправленной транзакции.
receipt_timeout_ms = 15000 # Максимальное ожидание receipt до включения восстановления.
rebroadcast_interval_ms = 1000 # Интервал повторной отправки той же подписанной транзакции с тем же nonce.
max_fee_multiplier_bps = 23000 # Максимальная max fee относительно base fee: 10000 = 1x, 23000 = 2.3x.

# =============================================================================
# ФАЙЛЫ — пути относительно каталога stable.toml
# =============================================================================

private_key_file = "./wallet.key" # Одна строка: 0x + 64 hex-символа; Linux: права 0600, Windows: доступ только доверенному пользователю.
database_path = "./stable.db" # SQLite-база девов и истории; sender создаст её автоматически.
name_blacklist_file = "./name_blacklist.txt" # Список запрещённых слов; sender создаст пустой файл автоматически.

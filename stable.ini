[BOT]
# Режим работы: SHADOW только наблюдает и проверяет настройки; LIVE подписывает и отправляет реальные транзакции.
MODE = SHADOW
# Путь к файлу с ключом: одна строка вида 0x + 64 hex-символа; перевод строки в конце допустим, права файла строго 0600.
PRIVATE_KEY_FILE = ./wallet.key
# Путь к отдельной SQLite-базе Stable: история девов, запусков, сделок, газа, PnL и сервисных комиссий.
DATABASE_PATH = ./stable.db

[NETWORK]
# HTTP RPC для чтения сети и отправки транзакций; несколько адресов указываются через запятую.
HTTP_RPC_URLS = https://stable.drpc.org, https://rpc.stable.xyz, https://rpc.sentio.xyz/stable-mainnet, https://stable.gateway.tenderly.co
# Необязательный отдельный пул RPC только для отправки; раскомментируйте строку и подставьте свои платные/private endpoints.
# BROADCAST_RPC_URLS = https://your-private-stable-rpc.example
# WebSocket RPC для подтверждённых блоков, логов фабрики и обновления состояния сети.
WEBSOCKET_URLS = wss://rpc.stable.xyz, wss://rpc.sentio.xyz/stable-mainnet, wss://stable.gateway.tenderly.co
# WebSocket RPC для pending-транзакций, чтобы увидеть новый запуск до включения в блок.
PENDING_WEBSOCKET_URLS = wss://rpc.stable.xyz, wss://stable.gateway.tenderly.co

[ENTRY]
# Минимальный первоначальный buy дева в USDT0, при котором запуск вообще разрешено покупать.
MINIMUM_DEVELOPER_BUY_STABLE = 10
# true означает «buy дева строго больше минимума»; false разрешает значение, равное минимуму.
STRICTLY_ABOVE_MINIMUM_DEVELOPER_BUY = false
# Размер покупки: developer повторяет buy дева, но не выше лимита; fixed всегда покупает фиксированную сумму.
BUY_SIZE_MODE = developer
# Фиксированный размер нашего buy в USDT0; используется только при BUY_SIZE_MODE = fixed.
FIXED_BUY_AMOUNT_STABLE = 100
# Максимальный размер нашего buy в USDT0 при BUY_SIZE_MODE = developer: min(buy дева, этот лимит).
DEVELOPER_BUY_CAP_STABLE = 100
# Минимальный остаток native USDT0, который бот обязан оставить на кошельке сверх buy и комиссии.
MINIMUM_WALLET_RESERVE_STABLE = 2
# Допустимое проскальзывание buy в базисных пунктах: 100 = 1%, 1500 = 15%.
BUY_SLIPPAGE_BPS = 1500
# Максимальный возраст запуска в миллисекундах; более старый сигнал бот пропустит.
MAX_LAUNCH_AGE_MS = 2500
# Gas limit для одной транзакции покупки; это потолок газа, а не обязательный расход.
GAS_LIMIT = 850000
# Максимальная priority fee для покупки в Gwei; итоговая max fee дополнительно ограничена настройкой TRANSACTIONS.MAX_FEE_MULTIPLIER_BPS.
BUY_PRIORITY_FEE_GWEI = 0.1
# true запрещает открывать новую кампанию, пока уже есть открытая позиция или незавершённая покупка.
SKIP_IF_POSITION_OPEN = true

[DEVELOPER_FILTERS]
# Нижние границы баланса дева в USDT0; каждой границе соответствует лимит из следующей строки с тем же индексом.
BALANCE_TIERS_STABLE = 0
# Максимальный первоначальный buy дева для каждого уровня BALANCE_TIERS_STABLE; сейчас принимается не более 100 USDT0.
MAX_INITIAL_BUY_STABLE = 100
# Максимальное число известных запусков одного дева в stable.db; 0 отключает этот лимит.
MAX_LAUNCHES = 1
# true разрешает деву превысить MAX_LAUNCHES, если в stable.db у него уже есть положительный реализованный PnL.
ALLOW_PROFITABLE = true
# true полностью отклоняет дева, если stable.db уже зафиксировала у него отрицательный реализованный PnL.
REJECT_NEGATIVE_PNL = true
# Минимальный nonce транзакции дева; off отключает этот фильтр.
MINIMUM_NONCE = off

[METADATA]
# true требует, чтобы изображение токена было размещено через IPFS.
REQUIRE_IPFS_IMAGE = true
# Путь к текстовому списку запрещённых слов/названий, по одному правилу на строку.
NAME_BLACKLIST_FILE = ./name_blacklist.txt
# true отклоняет токен, если такой же fingerprint изображения уже встречался в stable.db.
BLOCK_DUPLICATE_IMAGE = true
# true отклоняет токен, если такой же набор социальных ссылок уже встречался в stable.db.
BLOCK_DUPLICATE_SOCIALS = true
# true отклоняет повтор такого же имени в пределах окна DUPLICATE_NAME_WINDOW_SECS.
BLOCK_DUPLICATE_NAME = true
# Окно в секундах, в котором одинаковое имя считается дубликатом.
DUPLICATE_NAME_WINDOW_SECS = 120
# Обязательные поля метаданных через запятую: telegram, twitter, website или description.
REQUIRED_FIELDS = twitter
# any требует хотя бы одно поле из REQUIRED_FIELDS; all требует присутствия всех перечисленных полей.
REQUIRED_FIELDS_MODE = any

[EXIT]
# Полная продажа при указанной прибыли в процентах относительно входа; off отключает общий take-profit.
TAKE_PROFIT_PCT = off
# Полная продажа при убытке: например -20 означает стоп на -20%; допустимо от -1 до -90, off отключает.
STOP_LOSS_PCT = off
# Не отправлять продажу, если расчётная выручка этой части позиции меньше указанного количества USDT0.
MINIMUM_SELL_STABLE = 0.000001
# Уровни прибыли сетки в процентах; 135 означает +135%. Каждому уровню соответствует процент продажи из следующей строки.
GRID_PROFIT_PCT = 135, 235, 400, 570, 900, 1235, 1570, 2300, 3400, 5150, 7650, 11400, 17400, 25900, 38900, 57400, 84900, 109900, 209900, 289900, 474900, 849900, 1649900, 2749900
# Процент текущего оставшегося баланса токена, продаваемый на каждом соответствующем уровне GRID_PROFIT_PCT.
GRID_SELL_PERCENT = 30, 25, 22, 20, 18, 16, 15, 12, 11, 10, 10, 10, 10, 10, 12, 19, 21, 24, 24, 22, 26, 31, 39, 40
# Trailing-stop: допустимое падение от максимальной зафиксированной цены в процентах; off отключает.
TRAILING_DROP_PCT = off
# Выше этой расчётной стоимости позиции в USDT0 trailing-stop отключается; 0 означает не отключать по стоимости.
TRAILING_DISABLE_ABOVE_STABLE = 0
# AFK-таймауты в формате прибыль_в_процентах:секунды; действует последний достигнутый порог, после таймаута продаётся остаток.
AFK_SCHEDULE = 0:1, 10:1, 30:1, 50:1, 80:2, 100:3, 125:3, 150:3, 200:4, 300:5, 400:8, 500:9, 600:10, 700:60, 800:90, 1000:120, 1500:140, 2000:160, 2500:190, 3000:220, 5000:2400, 7000:3600, 8000:999999, 10000:999999, 15000:999999, 20000:999999, 30000:999999, 50000:999999, 100000:999999
# Сброс таймера AFK: any_move при любом изменении котировки, rise только при новом максимуме.
AFK_RESET_ON = any_move
# Выше этой расчётной стоимости позиции в USDT0 AFK-продажа отключается; 0 означает никогда не отключать.
AFK_DISABLE_ABOVE_STABLE = 0
# Допустимое проскальзывание продажи в базисных пунктах: 100 = 1%, 1500 = 15%.
SELL_SLIPPAGE_BPS = 1500
# Gas limit транзакции approve перед продажей; это потолок газа, а не обязательный расход.
APPROVE_GAS_LIMIT = 120000
# Gas limit транзакции продажи; это потолок газа, а не обязательный расход.
SELL_GAS_LIMIT = 800000
# Частота пересчёта grid/AFK/stop-loss/take-profit в миллисекундах.
EVALUATION_INTERVAL_MS = 100
# Частота watchdog-проверки зависших позиций и незавершённых выходов в миллисекундах.
WATCHDOG_INTERVAL_MS = 2000
# Максимальное число повторов неуспешной продажи после первой попытки.
MAX_SELL_RETRIES = 3
# Пауза между повторными попытками продажи в миллисекундах.
SELL_RETRY_MS = 250
# Максимальная priority fee для approve и sell в Gwei.
SELL_PRIORITY_FEE_GWEI = 0.1

[TRANSACTIONS]
# Максимальная max fee как множитель base fee в базисных пунктах: 10000 = 1x, 23000 = 2.3x.
MAX_FEE_MULTIPLIER_BPS = 23000
# Частота проверки receipt отправленной транзакции в миллисекундах.
RECEIPT_POLL_MS = 100
# Сколько миллисекунд ждать receipt до перехода в восстановление неопределённой транзакции.
RECEIPT_TIMEOUT_MS = 15000
# Интервал повторной отправки той же подписанной транзакции с тем же nonce; это доставка, а не FLOOD и не новый buy.
REBROADCAST_INTERVAL_MS = 1000
# Таймаут одного HTTP RPC-запроса в миллисекундах.
RPC_TIMEOUT_MS = 1500
# Максимальное число RPC, куда одна и та же подписанная транзакция отправляется параллельно.
BROADCAST_FANOUT = 4
